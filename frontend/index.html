<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Framework Login System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 450px;
            max-width: 90%;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .backend-selector {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }
        .backend-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .backend-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .backend-btn.fastapi { background: #059669; color: white; }
        .backend-btn.django { background: #0C4B33; color: white; }
        .backend-btn.node { background: #339933; color: white; }
        .backend-btn.dotnet { background: #512BD4; color: white; }
        .form-container { padding: 30px; }
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }
        .input-group input:focus { border-color: #667eea; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .toggle-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .toggle-btn {
            flex: 1;
            padding: 10px;
            background: #f5f5f5;
            color: #333;
            margin-bottom: 0;
        }
        .toggle-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .framework-badge {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Welcome</h1>
            <p>Multi-Framework Authentication System</p>
        </div>
        <div class="backend-selector">
            <button class="backend-btn fastapi" onclick="setBackend('fastapi')">FastAPI</button>
            <button class="backend-btn django" onclick="setBackend('django')">Django</button>
            <button class="backend-btn node" onclick="setBackend('node')">Node.js</button>
            <button class="backend-btn dotnet" onclick="setBackend('dotnet')">.NET</button>
        </div>
        <div class="form-container">
            <div class="toggle-buttons">
                <button class="toggle-btn active" onclick="setMode('login')">Login</button>
                <button class="toggle-btn" onclick="setMode('register')">Register</button>
            </div>
            <div id="login-form">
                <div class="input-group"><input type="text" id="login-username" placeholder=" "><label>Username or Email</label></div>
                <div class="input-group"><input type="password" id="login-password" placeholder=" "><label>Password</label></div>
                <button onclick="login()">Login</button>
            </div>
            <div id="register-form" style="display: none;">
                <div class="input-group"><input type="text" id="reg-username" placeholder=" "><label>Username</label></div>
                <div class="input-group"><input type="email" id="reg-email" placeholder=" "><label>Email</label></div>
                <div class="input-group"><input type="password" id="reg-password" placeholder=" "><label>Password</label></div>
                <div class="input-group"><input type="password" id="reg-confirm" placeholder=" "><label>Confirm Password</label></div>
                <button onclick="register()">Create Account</button>
            </div>
            <div id="message" class="message"></div>
            <div class="framework-badge">Connected to: <span id="backend-name">FastAPI</span></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
