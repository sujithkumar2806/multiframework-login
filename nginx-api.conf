events {
    worker_connections 1024;
}
http {
    upstream fastapi_backend {
        server fastapi-backend:8000;
    }
    upstream django_backend {
        server django-backend:8000;
    }
    upstream node_backend {
        server node-backend:3000;
    }
    upstream dotnet_backend {
        server dotnet-backend:8080;
    }
    upstream grafana {
        server grafana:3000;
    }
    upstream prometheus {
        server prometheus:9090;
    }
    
    server {
        listen 80;
        
        # Health check for ALB
        location /health {
            proxy_pass http://fastapi_backend/api/health;
            proxy_set_header Host $host;
        }
        
        # API routes
        location /api/fastapi/ {
            rewrite ^/api/fastapi/(.*) /api/$1 break;
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
        }
        
        location /api/django/ {
            rewrite ^/api/django/(.*) /api/$1 break;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
        }
        
        location /api/node/ {
            rewrite ^/api/node/(.*) /api/$1 break;
            proxy_pass http://node_backend;
            proxy_set_header Host $host;
        }
        
        location /api/dotnet/ {
            rewrite ^/api/dotnet/(.*) /api/$1 break;
            proxy_pass http://dotnet_backend;
            proxy_set_header Host $host;
        }
        
        # Grafana (no port needed!)
        location /grafana/ {
            rewrite ^/grafana/(.*) /$1 break;
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Prometheus
        location /prometheus/ {
            rewrite ^/prometheus/(.*) /$1 break;
            proxy_pass http://prometheus;
            proxy_set_header Host $host;
        }
    }
}
