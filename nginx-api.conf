events {
    worker_connections 1024;
}

http {
    upstream fastapi_backend  { server fastapi-backend:8000; }
    upstream django_backend   { server django-backend:8000; }
    upstream node_backend     { server node-backend:3000; }
    upstream dotnet_backend   { server dotnet-backend:8080; }
    upstream grafana_upstream { server grafana:3000; }
    upstream prometheus_upstream { server prometheus:9090; }

    server {
        listen 80;

        # ALB health check
        location /health {
            proxy_pass http://fastapi_backend/api/health;
            proxy_set_header Host $host;
        }

        # API routes
        location /api/fastapi/ {
            rewrite ^/api/fastapi/(.*) /api/$1 break;
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
        }

        location /api/django/ {
            rewrite ^/api/django/(.*) /api/$1 break;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
        }

        location /api/node/ {
            rewrite ^/api/node/(.*) /api/$1 break;
            proxy_pass http://node_backend;
            proxy_set_header Host $host;
        }

        location /api/dotnet/ {
            rewrite ^/api/dotnet/(.*) /api/$1 break;
            proxy_pass http://dotnet_backend;
            proxy_set_header Host $host;
        }

        # Grafana — key fix: proxy_pass must keep the /grafana/ prefix
        # Don't rewrite — let GF_SERVER_ROOT_URL handle subpath routing
        location /grafana/ {
            proxy_pass http://grafana_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket support (required for Grafana live panels)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Prometheus — keep prefix, let Prometheus handle its own routing
        location /prometheus/ {
            proxy_pass http://prometheus_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}