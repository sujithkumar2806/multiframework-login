global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'fastapi-backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['fastapi-backend:8000']

  - job_name: 'django-backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['django-backend:8000']

  - job_name: 'node-backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['node-backend:3000']

  - job_name: 'dotnet-backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['dotnet-backend:8080']
  

  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://fastapi-backend:8000/api/health
        - http://django-backend:8000/api/health
        - http://node-backend:3000/api/health
        - http://dotnet-backend:8080/api/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
