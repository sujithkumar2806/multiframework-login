global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'fastapi-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['fastapi-backend:8000']
    scrape_interval: 30s

  - job_name: 'django-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['django-backend:8000']
    scrape_interval: 30s

  - job_name: 'node-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['node-backend:3000']
    scrape_interval: 30s

  - job_name: 'dotnet-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['dotnet-backend:8080']
    scrape_interval: 30s

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-api:80']
    scrape_interval: 30s
