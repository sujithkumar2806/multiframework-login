global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'fastapi-backend'
    static_configs:
      - targets: ['fastapi-backend:8000']

  - job_name: 'django-backend'
    static_configs:
      - targets: ['django-backend:8000']

  - job_name: 'node-backend'
    static_configs:
      - targets: ['node-backend:3000']

  - job_name: 'dotnet-backend'
    static_configs:
      - targets: ['dotnet-backend:8080']