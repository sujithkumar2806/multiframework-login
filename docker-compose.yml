services:
  fastapi-backend:
    build: ./fastapi-server
    container_name: fastapi-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
    ports:
      - "8001:8000"
    networks:
      - app-network
    restart: unless-stopped

  django-backend:
    build: ./django-server
    container_name: django-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
    ports:
      - "8002:8000"
    networks:
      - app-network
    restart: unless-stopped

  node-backend:
    build: ./node-server
    container_name: node-backend
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: ${DB_PORT}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
    ports:
      - "8003:3000"
    networks:
      - app-network
    restart: unless-stopped

  dotnet-backend:
    build: ./dotnet-server
    container_name: dotnet-backend
    environment:
      DATABASE_URL: Host=${DB_HOST};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    ports:
      - "8004:8080"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
