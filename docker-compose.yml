services:
  postgres:
    image: postgres:15
    container_name: multiframework-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi-backend:
    build: ./fastapi-server
    container_name: fastapi-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${FASTAPI_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  django-backend:
    build: ./django-server
    container_name: django-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${DJANGO_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  node-backend:
    build: ./node-server
    container_name: node-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${NODE_PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  dotnet-backend:
    build: ./dotnet-server
    container_name: dotnet-backend
    environment:
      DATABASE_URL: ${DOTNET_DATABASE_URL}
    ports:
      - "${DOTNET_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - app-network

  nginx:
    build: ./nginx
    container_name: nginx-lb
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      - fastapi-backend
      - django-backend
      - node-backend
      - dotnet-backend
      - frontend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
